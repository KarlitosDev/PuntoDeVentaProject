services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: MSSQL_Server
    restart: always
    environment:
      SA_PASSWORD: "Tecnm123!"
      ACCEPT_EULA: "Y"
    volumes:
      - ./PuntoDeVentaTBD.sql:/var/opt/mssql/temp/PuntoDeVentaTBD.sql   
    ports:
      - "1434:1433"
    # command: /bin/bash -c "sleep 60 && /opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P 'Tecnm123!' -i /var/opt/mssql/temp/PuntoDeVentaTBD.sql -C"
